<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar conta — Lume</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseClient = supabase.createClient(
      'https://sochclzcxdoprbvqumac.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvY2hjbHpjeGRvcHJidnF1bWFjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3NjI5ODQsImV4cCI6MjA5MzMzODk4NH0.pyYh-EY-c6wQpVM_cg-M1vHeMc_stZOm2PazR7YDet8'
    );
  </script>
</head>
<body>

<div class="auth-page">
  <!-- Wave background (full page, behind card) -->
  <div class="wave-bg" id="waveBg"></div>

  <div class="auth-card">
    <div class="auth-card-logo">
      <img src="simbolo-preto.png" alt="Lume">
      <span class="brand">Lume</span>
    </div>

    <h1 class="auth-card-title">Criar conta</h1>
    <p class="auth-card-sub">Preencha os dados para começar.</p>

    <form class="auth-form" id="signupForm">
      <div class="form-field">
        <label class="form-label" for="name">Nome completo</label>
        <input class="input" type="text" id="name" placeholder="Seu nome" autocomplete="name">
      </div>
      <div class="form-field">
        <label class="form-label" for="email">E-mail</label>
        <input class="input" type="email" id="email" placeholder="seu@email.com" autocomplete="email">
      </div>
      <div class="form-field">
        <label class="form-label" for="password">Senha</label>
        <input class="input" type="password" id="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password">
      </div>
      <div class="form-field">
        <label class="form-label" for="password2">Confirmar senha</label>
        <input class="input" type="password" id="password2" placeholder="Repita a senha" autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:4px;">
        Criar conta
      </button>
    </form>

    <p class="auth-link">
      Já tem conta? <a href="index.html">Entrar</a>
    </p>
  </div>
</div>

<script>
  document.getElementById('signupForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const password2 = document.getElementById('password2').value;
    const btn = this.querySelector('button[type="submit"]');

    if (password !== password2) {
      alert('As senhas não coincidem.');
      return;
    }

    if (password.length < 8) {
      alert('A senha deve ter no mínimo 8 caracteres.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Criando conta...';

    const { data, error } = await supabaseClient.auth.signUp({
      email: email,
      password: password,
      options: {
        data: {
          full_name: name
        }
      }
    });

    if (error) {
      alert('Erro ao criar conta: ' + error.message);
      btn.disabled = false;
      btn.textContent = 'Criar conta';
      return;
    }

    alert('Conta criada com sucesso! Verifique seu e-mail para confirmar.');
    window.location.href = 'index.html';
  });
</script>

<script type="module">
  import { initWaveBg } from './wave.js';
  initWaveBg(document.getElementById('waveBg'), {
    // Slightly lighter on signup page — card is central, wave is pure texture
    strokeColor: 'rgba(15, 61, 62, 0.09)',
    xGap: 22,
    yGap: 22,
    amplitude: 0.75,
  });
</script>
</body>
</html>
